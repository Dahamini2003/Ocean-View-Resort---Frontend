<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>Login — Ocean View Resort</title>
  <link rel="stylesheet" href="./styles.css"/>

  <!-- ✅ Auto redirect if already logged in -->
  <script>
    (function () {
      const token = sessionStorage.getItem("token") || "";
      const role  = (sessionStorage.getItem("role") || "").toUpperCase();
      if (token) {
        location.replace(role === "ADMIN" ? "./admin.html" : "./reception.html");
      }
    })();
  </script>
</head>
<body>
<header class="topbar">
  <div class="brand">
    <div class="logo">OV</div>
    <div>
      <div class="title">Ocean View Resort</div>
    </div>
  </div>
</header>

<main class="container">
  <section class="panel">
    <h2>Login</h2>

    <section id="toast" class="toast" hidden></section>

    <form id="loginForm" class="grid2">
      <label class="field">
        <span>Username</span>
        <input id="username" type="text" placeholder="Enter your username" required />
      </label>

      <label class="field">
        <span>Password</span>
        <input id="password" type="password" placeholder="Enter your password" required />
      </label>

      <div class="actions">
        <button class="btn" type="submit">Login</button>
      </div>
    </form>

    <pre id="helpBox" class="helpBox" hidden></pre>
  </section>
</main>

<footer class="footer">Ocean View Resort ©</footer>

<script src="./common.js"></script>
<script src="./login.js"></script>
</body>
</html>
